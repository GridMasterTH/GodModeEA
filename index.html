<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOD MODE EA - Risk Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d0d17; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; }
        .card { background-color: #131323; border: 1px solid #4646e6; border-top: 4px solid #4646e6; }
        .input-field { background-color: #1a1a2e; border: 1px solid #3f3f5f; color: white; padding: 10px; border-radius: 6px; width: 100%; font-size: 14px; }
        .input-field:focus { border-color: #6366f1; outline: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; min-width: 600px; }
        th { background-color: #181838; color: #a0a0ff; text-align: left; padding: 12px; font-size: 13px; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #2a2a4a; font-size: 14px; }
        tr:hover { background-color: #1c1c3c; }
        .warning { color: #ff5050; font-weight: bold; }
        .safe { color: #00dc78; }
        .label-text { display: block; text-sm; margin-bottom: 4px; color: #94a3b8; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-center text-blue-400">⚡ GOD MODE EA v2.0 Calculator</h1>
        
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="card p-6 rounded-lg shadow-2xl lg:col-span-1">
                <h2 class="text-xl mb-4 border-b border-gray-700 pb-2 text-blue-300">⚙️ Settings</h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="label-text">Balance ($)</label>
                        <input type="number" id="balance" value="1000" class="input-field" oninput="calculate()">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="label-text">Start Lot</label>
                            <input type="number" id="startLot" value="0.01" step="0.01" class="input-field" oninput="calculate()">
                        </div>
                        <div>
                            <label class="label-text">Multiplier</label>
                            <input type="number" id="multiplier" value="1.3" step="0.1" class="input-field" oninput="calculate()">
                        </div>
                    </div>
                    <div>
                        <label class="label-text">Base Step (Points)</label>
                        <input type="number" id="baseStep" value="700" class="input-field" oninput="calculate()">
                    </div>
                    <div>
                        <label class="label-text">Max Orders</label>
                        <input type="number" id="maxOrders" value="20" class="input-field" oninput="calculate()">
                    </div>

                    <div class="pt-4 border-t border-gray-800">
                        <p class="text-xs text-yellow-500 mb-2 font-bold">ข้อมูลจาก Specification ใน MT5:</p>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="label-text text-xs">Contract Size</label>
                                <input type="number" id="contractSize" value="100" class="input-field" oninput="calculate()">
                            </div>
                            <div>
                                <label class="label-text text-xs">Point Size</label>
                                <input type="number" id="pointSize" value="0.01" step="0.001" class="input-field" oninput="calculate()">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card p-6 rounded-lg shadow-2xl lg:col-span-3 overflow-x-auto">
                <h2 class="text-xl mb-4 border-b border-gray-700 pb-2 text-blue-300">📊 Risk Analysis</h2>
                <div id="results">
                    <table>
                        <thead>
                            <tr>
                                <th>Order</th>
                                <th>Lot Size</th>
                                <th>Total Lot</th>
                                <th>Distance (Pts)</th>
                                <th>Floating Loss</th>
                                <th>Drawdown %</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calculate() {
            const balance = parseFloat(document.getElementById('balance').value) || 0;
            const startLot = parseFloat(document.getElementById('startLot').value) || 0;
            const multiplier = parseFloat(document.getElementById('multiplier').value) || 0;
            const baseStep = parseFloat(document.getElementById('baseStep').value) || 0;
            const maxOrders = parseInt(document.getElementById('maxOrders').value) || 0;
            
            // สูตรคำนวณตาม MT5
            const contractSize = parseFloat(document.getElementById('contractSize').value) || 0;
            const pointSize = parseFloat(document.getElementById('pointSize').value) || 0;
            const pointValuePerLot = contractSize * pointSize;

            let tableBody = '';
            let totalLots = 0;
            let totalLoss = 0;
            let currentDistance = 0;

            for (let i = 1; i <= maxOrders; i++) {
                let currentLot = startLot * Math.pow(multiplier, i - 1);
                currentLot = Math.round(currentLot * 100) / 100;
                
                if (i > 1) {
                    // การลาก 1 Step กระทบกับทุก Lot ที่เปิดอยู่ก่อนหน้า
                    totalLoss += (totalLots * baseStep * pointValuePerLot);
                    currentDistance += baseStep;
                }
                
                totalLots += currentLot;
                totalLots = Math.round(totalLots * 100) / 100;
                
                const ddPercent = balance > 0 ? (totalLoss / balance) * 100 : 0;
                const isBlown = ddPercent >= 100;
                const statusClass = ddPercent > 80 ? 'warning' : (ddPercent > 30 ? 'text-yellow-500' : 'safe');

                tableBody += `
                    <tr class="${isBlown ? 'bg-red-950/40' : ''}">
                        <td class="font-bold text-gray-400">#${i}</td>
                        <td>${currentLot.toFixed(2)}</td>
                        <td>${totalLots.toFixed(2)}</td>
                        <td>${currentDistance.toLocaleString()}</td>
                        <td class="${statusClass}">-$${totalLoss.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                        <td class="${statusClass}">${ddPercent.toFixed(2)}%</td>
                    </tr>
                `;

                if (totalLoss > balance * 2) break; 
            }
            document.getElementById('tableBody').innerHTML = tableBody;
        }
        calculate();
    </script>
</body>
</html>
